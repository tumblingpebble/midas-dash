name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI (mock mode)
        run: |
          cat > .env <<EOF
          LIVE_PROVIDERS=0
          FINNHUB_TOKEN=
          TIINGO_TOKEN=
          EOF

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Wait for gateway health
        run: |
          for i in $(seq 1 60); do
            ok="$(docker inspect --format='{{json .State.Health.Status}}' $(docker compose ps -q gateway_api) 2>/dev/null || true)"
            echo "gateway health=$ok"
            if [ "$ok" = "\"healthy\"" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway did not become healthy"
          docker compose ps
          docker compose logs gateway_api context_api recommender_api sentiment_api midas_dash
          exit 1

      - name: Smoke test endpoints
        run: |
          curl -fsS http://127.0.0.1:8015/healthz
          curl -fsS "http://127.0.0.1:8015/api/run?ticker=AAPL&explain=1" | head -c 300

      - name: Tear down
        if: always()
        run: |
          docker compose down -v

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [compose-smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker compose build

      - name: Prepare Trivy cache
        run: |
          mkdir -p .trivycache

      - name: Scan gateway_api image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivycache:/root/.cache/" \
            aquasec/trivy:0.65.0 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            midas-dash-gateway_api:latest

      - name: Scan context_api image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivycache:/root/.cache/" \
            aquasec/trivy:0.65.0 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            midas-dash-context_api:latest

      - name: Scan recommender_api image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivycache:/root/.cache/" \
            aquasec/trivy:0.65.0 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            midas-dash-recommender_api:latest

      - name: Scan sentiment_api image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivycache:/root/.cache/" \
            aquasec/trivy:0.65.0 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            midas-dash-sentiment_api:latest

      - name: Scan midas_dash image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivycache:/root/.cache/" \
            aquasec/trivy:0.65.0 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            midas-dash-midas_dash:latest

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker compose build

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOMs
        run: |
          mkdir -p sbom

          syft midas-dash-gateway_api:latest -o cyclonedx-json > sbom/gateway_api.sbom.json
          syft midas-dash-context_api:latest -o cyclonedx-json > sbom/context_api.sbom.json
          syft midas-dash-recommender_api:latest -o cyclonedx-json > sbom/recommender_api.sbom.json
          syft midas-dash-sentiment_api:latest -o cyclonedx-json > sbom/sentiment_api.sbom.json
          syft midas-dash-midas_dash:latest -o cyclonedx-json > sbom/midas_dash_web.sbom.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: midas-dash-sboms
          path: sbom/*.json