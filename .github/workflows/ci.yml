name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI (mock mode)
        run: |
          cat > .env <<EOF
          LIVE_PROVIDERS=0
          FINNHUB_TOKEN=
          TIINGO_TOKEN=
          EOF

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Wait for gateway health
        run: |
          for i in $(seq 1 60); do
            ok="$(docker inspect --format='{{json .State.Health.Status}}' $(docker compose ps -q gateway_api) 2>/dev/null || true)"
            echo "gateway health=$ok"
            if [ "$ok" = "\"healthy\"" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway did not become healthy"
          docker compose ps
          docker compose logs gateway_api context_api recommender_api sentiment_api midas_dash
          exit 1

      - name: Smoke test endpoints
        run: |
          curl -fsS http://127.0.0.1:8015/healthz
          curl -fsS "http://127.0.0.1:8015/api/run?ticker=AAPL&explain=1" | head -c 300

      - name: Tear down
        if: always()
        run: |
          docker compose down -v

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [compose-smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker compose build

      - name: Scan gateway_api image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "midas-dash-gateway_api:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Scan context_api image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "midas-dash-context_api:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Scan recommender_api image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "midas-dash-recommender_api:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Scan sentiment_api image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "midas-dash-sentiment_api:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Scan midas_dash image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "midas-dash-midas_dash:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"