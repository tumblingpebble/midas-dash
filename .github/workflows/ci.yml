name: ci

on:
  pull_request:
  push:
    branches: ["main", "proto2-hud-2025-12-05"]

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI (mock mode)
        run: |
          cat > .env <<EOF
          LIVE_PROVIDERS=0
          FINNHUB_TOKEN=
          TIINGO_TOKEN=
          EOF

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Wait for gateway health
        run: |
          for i in $(seq 1 60); do
            ok="$(docker inspect --format='{{json .State.Health.Status}}' $(docker compose ps -q gateway_api) 2>/dev/null || true)"
            echo "gateway health=$ok"
            if [ "$ok" = "\"healthy\"" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway did not become healthy"
          docker compose ps
          docker compose logs gateway_api context_api recommender_api sentiment_api midas_dash
          exit 1

      - name: Smoke test endpoints
        run: |
          curl -fsS http://127.0.0.1:8015/healthz
          curl -fsS "http://127.0.0.1:8015/api/run?ticker=AAPL&explain=1" | head -c 300

      - name: Tear down
        if: always()
        run: |
          docker compose down -v

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [compose-smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Build images (no need to run)
        run: |
          docker compose build

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.58.2_Linux-64bit.tar.gz | tar -xz
          sudo mv trivy /usr/local/bin/trivy

      # Scan the built images. Fail on HIGH/CRITICAL.
      - name: Scan gateway_api image
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL midas-gateway_api:latest

      - name: Scan context_api image
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL midas-context_api:latest

      - name: Scan recommender_api image
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL midas-recommender_api:latest

      - name: Scan sentiment_api image
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL midas-sentiment_api:latest

      - name: Scan midas_dash image
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL midas-midas_dash:latest
