name: Deploy MIDAS DASH to Cloud Run (Manual)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  AR_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
  AR_HOST: us-central1-docker.pkg.dev

  SENTIMENT_SERVICE: sentiment-api
  CONTEXT_SERVICE: context-api
  RECOMMENDER_SERVICE: recommender-api
  GATEWAY_SERVICE: gateway-api
  WEB_SERVICE: midas-dash-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: midas-dash-manual-cloud-run
      cancel-in-progress: false

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.git_ref }}
          lfs: true

      - name: Pull Git LFS files
        run: |
          git lfs install
          git lfs pull

      - name: Verify SetFit model artifact
        run: |
          ls -lah audit_logs/sentiment_audit/setfit_model_hpc_full
          du -sh audit_logs/sentiment_audit/setfit_model_hpc_full
          test -f audit_logs/sentiment_audit/setfit_model_hpc_full/model.safetensors
          python - <<'PY'
          from pathlib import Path
          p = Path("audit_logs/sentiment_audit/setfit_model_hpc_full/model.safetensors")
          print("size_bytes:", p.stat().st_size)
          assert p.stat().st_size > 100_000_000, "model.safetensors looks too small; likely LFS pointer not real file"
          PY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${AR_HOST}" --quiet

      - name: Set deploy metadata
        shell: bash
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "${GITHUB_ENV}"
          echo "IMAGE_PREFIX=${AR_HOST}/${PROJECT_ID}/${AR_REPO}" >> "${GITHUB_ENV}"

      - name: Build and push sentiment-api image
        run: |
          docker build \
            -f services/Dockerfile.sentiment \
            -t "${IMAGE_PREFIX}/sentiment-api:${SHORT_SHA}" \
            .
          docker push "${IMAGE_PREFIX}/sentiment-api:${SHORT_SHA}"

      - name: Deploy sentiment-api
        run: |
          gcloud run deploy "${SENTIMENT_SERVICE}" \
            --image "${IMAGE_PREFIX}/sentiment-api:${SHORT_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 300 \
            --set-env-vars "SENT_TTL_S=90"

      - name: Capture sentiment-api URL
        shell: bash
        run: |
          SENT_URL="$(gcloud run services describe "${SENTIMENT_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --format='value(status.url)')"
          echo "SENT_URL=${SENT_URL}" >> "${GITHUB_ENV}"
          echo "sentiment-api URL: ${SENT_URL}"

      - name: Smoke test sentiment-api
        run: |
          curl -fsS "${SENT_URL}/openapi.json" | grep -q '"title":"MIDAS Sentiment API"'
          curl -fsS "${SENT_URL}/api/sentiment" \
            -H 'Content-Type: application/json' \
            -d '{"texts":["AAPL beats earnings expectations and rallies on upgrade","Company faces investigation and bearish warning"]}' \
            | grep -q '"engine"'

      - name: Build and push context-api image
        run: |
          docker build \
            -f services/Dockerfile \
            --build-arg REQ_FILE=requirements.base.txt \
            --build-arg APP_MODULE=services.context_api.app:app \
            -t "${IMAGE_PREFIX}/context-api:${SHORT_SHA}" \
            .
          docker push "${IMAGE_PREFIX}/context-api:${SHORT_SHA}"

      - name: Deploy context-api in live mode
        run: |
          gcloud run deploy "${CONTEXT_SERVICE}" \
            --image "${IMAGE_PREFIX}/context-api:${SHORT_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "LIVE_PROVIDERS=1,SENT_URL=${SENT_URL},SENT_TIMEOUT_S=20" \
            --update-secrets "FINNHUB_TOKEN=FINNHUB_TOKEN:1,TIINGO_TOKEN=TIINGO_TOKEN:1"

      - name: Capture context-api URL
        shell: bash
        run: |
          CONTEXT_URL="$(gcloud run services describe "${CONTEXT_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --format='value(status.url)')"
          echo "CONTEXT_URL=${CONTEXT_URL}" >> "${GITHUB_ENV}"
          echo "context-api URL: ${CONTEXT_URL}"

      - name: Smoke test context-api
        run: |
          curl -fsS "${CONTEXT_URL}/openapi.json" | grep -q '"title":"MIDAS Context API"'
          curl -fsS "${CONTEXT_URL}/api/features/v2?ticker=AAPL" | grep -q '"features"'
          curl -fsS "${CONTEXT_URL}/api/features/v2?ticker=BAC" | grep -q '"sentiment"'

      - name: Build and push recommender-api image
        run: |
          docker build \
            -f services/Dockerfile \
            --build-arg REQ_FILE=requirements.base.txt \
            --build-arg APP_MODULE=services.recommender_api.app:app \
            -t "${IMAGE_PREFIX}/recommender-api:${SHORT_SHA}" \
            .
          docker push "${IMAGE_PREFIX}/recommender-api:${SHORT_SHA}"

      - name: Deploy recommender-api
        run: |
          gcloud run deploy "${RECOMMENDER_SERVICE}" \
            --image "${IMAGE_PREFIX}/recommender-api:${SHORT_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      - name: Capture recommender-api URL
        shell: bash
        run: |
          RECOMMENDER_URL="$(gcloud run services describe "${RECOMMENDER_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --format='value(status.url)')"
          echo "RECOMMENDER_URL=${RECOMMENDER_URL}" >> "${GITHUB_ENV}"
          echo "recommender-api URL: ${RECOMMENDER_URL}"

      - name: Smoke test recommender-api
        run: |
          curl -fsS "${RECOMMENDER_URL}/openapi.json" | grep -q '"title":"MIDAS Recommender API"'

      - name: Build and push gateway-api image
        run: |
          docker build \
            -f services/Dockerfile \
            --build-arg REQ_FILE=requirements.base.txt \
            --build-arg APP_MODULE=services.gateway_api.app:app \
            -t "${IMAGE_PREFIX}/gateway-api:${SHORT_SHA}" \
            .
          docker push "${IMAGE_PREFIX}/gateway-api:${SHORT_SHA}"

      - name: Deploy gateway-api
        run: |
          gcloud run deploy "${GATEWAY_SERVICE}" \
            --image "${IMAGE_PREFIX}/gateway-api:${SHORT_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "CTX_URL=${CONTEXT_URL},REC_URL=${RECOMMENDER_URL},ALLOW_ORIGINS=*"

      - name: Capture gateway-api URL
        shell: bash
        run: |
          GATEWAY_URL="$(gcloud run services describe "${GATEWAY_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --format='value(status.url)')"
          echo "GATEWAY_URL=${GATEWAY_URL}" >> "${GITHUB_ENV}"
          echo "gateway-api URL: ${GATEWAY_URL}"

      - name: Smoke test gateway-api
        run: |
          curl -fsS "${GATEWAY_URL}/openapi.json" | grep -q '"title":"MIDAS Gateway API"'
          curl -fsS "${GATEWAY_URL}/api/run?ticker=AAPL&explain=1" | grep -q '"recommendation"'
          curl -fsS "${GATEWAY_URL}/api/run?ticker=BAC&explain=1" | grep -q '"sentiment"'

      - name: Build and push web image
        run: |
          docker build \
            -f platform_app/Dockerfile \
            --build-arg VITE_API_BASE_URL="${GATEWAY_URL}" \
            -t "${IMAGE_PREFIX}/midas-dash-web:${SHORT_SHA}" \
            .
          docker push "${IMAGE_PREFIX}/midas-dash-web:${SHORT_SHA}"

      - name: Deploy midas-dash-web
        run: |
          gcloud run deploy "${WEB_SERVICE}" \
            --image "${IMAGE_PREFIX}/midas-dash-web:${SHORT_SHA}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      - name: Final verification
        shell: bash
        run: |
          WEB_URL="$(gcloud run services describe "${WEB_SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --format='value(status.url)')"

          echo "Deployed:"
          echo "  sentiment-api    ${SENT_URL}"
          echo "  context-api      ${CONTEXT_URL}"
          echo "  recommender-api  ${RECOMMENDER_URL}"
          echo "  gateway-api      ${GATEWAY_URL}"
          echo "  midas-dash-web   ${WEB_URL}"

          echo
          curl -I "${WEB_URL}"
          echo
          curl -fsS "${SENT_URL}/api/sentiment" \
            -H 'Content-Type: application/json' \
            -d '{"texts":["Bank of America (BAC) Remains in Warren Buffett’s Portfolio Since 2011; See Why","This Is Why Jefferies Believes Bank of America Corporation (BAC) Is a Buy","Piper Sandler, Truist Raise Bank of America (BAC) Targets After Q1 Beat"]}' \
            | grep -q '"engine"'
          curl -fsS "${CONTEXT_URL}/api/features/v2?ticker=BAC" | grep -q '"sentiment"'
          curl -fsS "${GATEWAY_URL}/api/run?ticker=BAC&explain=1" | grep -q '"sentiment"'