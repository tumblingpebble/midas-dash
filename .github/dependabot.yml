version: 2
updates:
  # Python deps (base + sentiment)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      python-deps:
        patterns:
          - "*"

  # Frontend deps (React app)
  - package-ecosystem: "npm"
    directory: "/platform_app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      npm-deps:
        patterns:
          - "*"